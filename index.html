
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="inputf.css">
    <link rel="icon" type="png" href="favicon.png" />

    <title>Facebook - log in or sign up</title>
</head>
<body class="bg-gray-100">
    <div class="container mt-48 flex mx-auto items-center justify-center">
        <div class="left w-1/3 mx-14">
            <img class="w-80" src="fb_logo.svg" alt="">
            <p class="text-3xl mx-8">Facebook helps you connect and share with the people in your life.</p>
        </div>
        <div class="right flex flex-col bg-white p-8 rounded-xl shadow-md w-1/4 text-lg relative">
            <input class="px-4 h-12 my-2 py-3 border border-1 border-gray-200 outline-blue-300  rounded-lg" type="text" placeholder="Email address or phone number">
            <input class="px-4 h-12 my-2 py-3 border border-1 border-gray-200  outline-blue-300 rounded-lg" type="password" placeholder="Password">
            <button class="my-2 bg-blue-600 text-white font-bold rounded-md text-x2 p-2 hover:bg-blue-700">Log In</button>
            <span class="mb-5 mt-2 text-center "> <a class="no-underline text-blue-600 text-sm hover:underline" href="">Forgotten password?</a></span>
            <hr>
            <button class="my-6 bg-lime-600 text-white font-bold rounded-md w-fit text-center text-x2 items-center px-4 mx-auto py-2 hover:bg-lime-700 ">Create New Account</button>
            <span class="absolute -bottom-10 text-sm"><span class="font-bold hover:underline cursor-pointer">Create a Page</span> for a celebrity, brand or business.</span>
        </div>
    </div>
</body>
</html>
